<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="main">
        <div id="input-container">
             <input type="text" id="input-login" class="input-auth" placeholder="login">
            <input type="text" id="input-pass" class="input-auth" placeholder="password">
        </div>
       
        <div id="btn-container"></div>
            <button onclick="singUp()" id="btn-act" class="btn-success">Sing up</button>
            <button onclick="singIn()" id="btn-act" class="btn-success">Sing in</button>
        </div>
    </div>
    

    <script src="script.js"></script>
</body>
</html>
